name: Deploy Jekyll Website to VServer

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.1'
        
    - name: Install dependencies
      run: |
        gem install bundler
        bundle install

    - name: Install TeX Live
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra latexmk

    - name: Compile One-Page CV EN PDF
      working-directory: LaTeX
      run: |
        export TZ="Europe/Berlin"
        latexmk -pdf -interaction=nonstopmode -jobname=One-Page-CV-EN One-Page-CV-EN.tex
        cp One-Page-CV-EN.pdf ../uploads/One-Page-CV-EN.pdf

    - name: Build Jekyll site
      run: |
        export BUILD_TIME="$(TZ='Europe/Berlin' date '+%Y-%m-%d %H:%M:%S %Z')"
        export BUILD_REF="${{ github.ref }}"
        export BUILD_COMMIT="${{ github.sha }}"
        bundle exec jekyll build

    - name: Copy site to VServer via SSH
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        source: "_site/*"
        target: ${{ secrets.TARGET }}
        strip_components: 1